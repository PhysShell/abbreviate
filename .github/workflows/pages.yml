name: Deploy web demo to Pages

on:
  push:
    branches: [claude/russian-ime-architecture-qmdroh]
    paths:
      - "crates/abbrev-wasm/**"
      - "crates/abbrev-core/**"
      - "platforms/web/**"
      - "data/lexicons/ru-50k.tsv"
      - "data/lm/ru-lm.tsv"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

# Allow the workflow to publish to Pages; one in-flight deploy at a time.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build demo (wasm + staged lexicon/LM)
        run: ./platforms/web/build.sh
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: platforms/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
