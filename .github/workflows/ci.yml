name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only by default; no job pushes or comments.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace
      - name: Acceptance benchmark (must stay 100%)
        run: cargo run -p abbrev-cli -- bench data/bench/basic.tsv
      - name: Generative benchmark (5k cases on real 48k lexicon, informational)
        run: |
          cargo build --release -p abbrev-cli
          ./target/release/abbrev gen --lexicon data/lexicons/ru-50k.tsv \
            --count 5000 --seed 42 -o /tmp/gen.tsv
          ./target/release/abbrev bench /tmp/gen.tsv --lexicon data/lexicons/ru-50k.tsv
      - name: Context benchmark (bigram LM lift, informational)
        run: |
          ./target/release/abbrev gen --lexicon data/lexicons/ru-50k.tsv \
            --context-from data/lm/ru-lm.tsv --count 5000 --seed 42 -o /tmp/gen-ctx.tsv
          echo "--- without LM:" && ./target/release/abbrev bench /tmp/gen-ctx.tsv \
            --lexicon data/lexicons/ru-50k.tsv | head -3
          echo "--- with LM:" && ./target/release/abbrev bench /tmp/gen-ctx.tsv \
            --lexicon data/lexicons/ru-50k.tsv --lm data/lm/ru-lm.tsv | head -3

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build engine for wasm32
        run: cargo build -p abbrev-wasm --target wasm32-unknown-unknown --release

  android-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Ensure SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Generate Kotlin bindings
        run: |
          cargo build -p abbrev-ffi --release
          cargo run -p uniffi-bindgen -- generate \
            --library target/release/libabbrev_ffi.so \
            --language kotlin --no-format \
            --out-dir platforms/android/app/src/uniffi/kotlin
      - name: Build engine .so (arm64)
        run: |
          export ANDROID_NDK_HOME="${ANDROID_NDK_HOME:-$ANDROID_NDK_LATEST_HOME}"
          cargo install cargo-ndk@4.1.2 --locked
          cargo ndk -t arm64-v8a -o platforms/android/app/src/main/jniLibs \
            build -p abbrev-ffi --release
      - name: Gradle unit tests + assembleDebug
        working-directory: platforms/android
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: scratchpad-debug-apk
          path: platforms/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
