name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace
      - name: Acceptance benchmark (must stay 100%)
        run: cargo run -p abbrev-cli -- bench data/bench/basic.tsv
      - name: Generative benchmark (5k cases on real 48k lexicon, informational)
        run: |
          cargo build --release -p abbrev-cli
          ./target/release/abbrev gen --lexicon data/lexicons/ru-50k.tsv \
            --count 5000 --seed 42 -o /tmp/gen.tsv
          ./target/release/abbrev bench /tmp/gen.tsv --lexicon data/lexicons/ru-50k.tsv
      - name: Context benchmark (bigram LM lift, informational)
        run: |
          ./target/release/abbrev gen --lexicon data/lexicons/ru-50k.tsv \
            --context-from data/lm/ru-lm.tsv --count 5000 --seed 42 -o /tmp/gen-ctx.tsv
          echo "--- without LM:" && ./target/release/abbrev bench /tmp/gen-ctx.tsv \
            --lexicon data/lexicons/ru-50k.tsv | head -3
          echo "--- with LM:" && ./target/release/abbrev bench /tmp/gen-ctx.tsv \
            --lexicon data/lexicons/ru-50k.tsv --lm data/lm/ru-lm.tsv | head -3

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build engine for wasm32
        run: cargo build -p abbrev-wasm --target wasm32-unknown-unknown --release

  android-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: Build engine for arm64
        run: cargo ndk -t arm64-v8a build -p abbrev-ffi --release
